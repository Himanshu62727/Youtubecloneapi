<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="loginstyle.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, black, blue, purple);
            transition: background 0.5s ease;
            animation: gradientAnimation 10s infinite alternate;
        }

        .login-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            min-width: 500px;
            min-height: 300px;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }

        button:hover {
            background-color: #cc0000;
        }

        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
            color: white;
        }

        a:hover {
            text-decoration: underline;
        }

        #btns {
            display: flex;
            justify-content: space-between;
        }

        /* Hide Register form by default */
        #registerContainer {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Login Form -->
    <div class="login-container" id="loginContainer">
        <h1 style="color: #333;">Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email:</label>
                <input type="email" id="username" name="username" placeholder="Enter @ email address" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter Your Password" required>
            </div>
            <div id="btns">
                <button type="submit" style="background-color: skyblue;">Submit</button>
                <button type="button" onclick="showRegister()">Register</button>
            </div>
        </form>
        <div id="error-message" class="error-message"></div>
    </div>

    <!-- Register Form -->
    <div class="login-container" id="registerContainer">
        <h1 style="color: #333;">Register</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="regname">Full Name:</label>
                <input type="text" id="regname" name="regname" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="regemail">Email:</label>
                <input type="email" id="regemail" name="regemail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirmpassword">Confirm Password:</label>
                <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Confirm Password" required>
            </div>
            <div id="btns">
                <button type="submit" id="loginForm" style="background-color: skyblue;">Register</button>
                <button type="button" onclick="showLogin()">Back to Login</button>
            </div>
        </form>
    </div>

    <script>

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmpassword').value;

            if (password != confirmPassword) {
                const newPara = document.createElement('p');
                newPara.textContent = 'Passwords do not match!';
                errorMessage.appendChild(newPara);
                return;
            }

            if (username) {
                alert('Login successful!');
                errorMessage.textContent = '';
                loginForm.reset();
            } else {
                errorMessage.textContent = 'Please enter a valid email and password.';
            }
        });

        function showRegister() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('registerContainer').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('registerContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
        }

    </script>
</body>

</html>
