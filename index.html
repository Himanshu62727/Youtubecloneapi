<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://img.favpng.com/10/23/11/youtube-portable-network-graphics-logo-image-computer-icons-png-favpng-5k5DNc5DBpxFXsqScWJ07n9iV.jpg"
        type="image/x-icon">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <img src="https://goodly.co.in/wp-content/uploads/2023/10/youtube-logo-png-46016.png" alt="YouTube Logo"
                class="logo">
        </div>
        <div class="header-center">
            <input type="search" placeholder="Search" class="search-bar">
            <button class="search-btn">Search</button>

            <button class="voice-btn" type="button" role="button" aria-label="Voice search">
                <svg class="voice-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
        </div>
        <div class="header-right">
            <button class="icon-btn">📹</button> <!-- Upload -->
            <button class="icon-btn">🔔</button> <!-- Notifications -->
            <a href="loginform.html" target="_blank" id="signup-btn"><img src="./images/HimanshuPIC.jpeg" alt="User" class="user-icon"></a>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-list">
                <li><a href="/">Home</a></li>
                <li><a href="#">Shorts</a></li>
                <li><a href="#">Subscriptions</a></li>
                <li><a href="#">Library</a></li>
                <li><a href="#">History</a></li>
                <li><a href="#">Your videos</a></li>
                <li><a href="#">Watch later</a></li>
                <li><a href="#">Liked videos</a></li>
            </ul>
        </aside>
        <!--Main Content-->
        <div class="output">
            <div class="listsCatergory">
                <ul class="mylists">
                    <li>All</li>
                    <li>JavaScript</li>
                    <li>WWE Championship</li>
                    <li>Music</li>
                    <li>Phonk Songs</li>
                    <li>Animate Vieos</li>
                    <li>Tollywood Movies</li>
                    <li>Background Music</li>
                    <li>Romantic Songs</li>
                    <li>Recently Songs</li>
                </ul>
            </div>
            <div id="output" class="content"></div>
        </div>
    </div>

</body>
<script src="script.js"></script>

</html>
